services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cs2_demos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cs2_demos?sslmode=disable
      PORT: 8080
      UPLOADS_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  postgres_data:
