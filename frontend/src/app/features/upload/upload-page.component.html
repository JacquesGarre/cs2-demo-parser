<section class="upload">
  <div class="upload__hero">
    <p class="upload__eyebrow">DEMO CONTROL // HOME</p>
    <h1>CS2 Demo Intelligence</h1>
    <p class="lead">
      Drop a GOTV <code>.dem</code> and get the full post-match debrief — no smoke, just intel.
    </p>

    <ng-container *ngIf="isUploading(); else uploadForm">
      <div class="upload-spinner">
        <div class="spinner-card">
          <div class="spinner-icon">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" stroke-dasharray="6 4" class="spin"/>
              <path d="M16 24l5 5 11-11" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
            </svg>
          </div>
          <h2>Deploying the demo feed</h2>
          <p class="spinner-status">{{ selectedFileName() }}</p>
          <div class="progress-track">
            <div class="progress-fill" [style.width.%]="uploadProgress()"></div>
          </div>
          <p class="progress-label">{{ uploadProgress() | number:'1.0-0' }}%</p>
        </div>
      </div>
    </ng-container>

    <ng-template #uploadForm>
      <label class="upload-card">
        <input type="file" accept=".dem" (change)="onFileSelected($event)" />
        <span class="upload-card__kicker">DROP ZONE</span>
        <strong>{{ selectedFileName() || 'Choose a .dem file' }}</strong>
        <small>Click to upload your replay and let the parser do the entry fragging.</small>
      </label>
    </ng-template>

    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>
  </div>
</section>
